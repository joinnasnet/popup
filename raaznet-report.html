<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>گزارش ویژه رازنت — نظارت و تجسس در ایران</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"Vazirmatn","IRANSans",Tahoma,"Geeza Pro","Segoe UI",sans-serif;
    background:#0a1230;
    background:radial-gradient(120% 90% at 70% 0%,#28379a 0%,#141d52 45%,#0a1230 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100%;padding:18px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;max-width:372px;
    background:#0d1638;
    border:1px solid rgba(120,140,255,.18);
    border-radius:22px;overflow:hidden;
    box-shadow:0 24px 60px -18px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.02) inset;
  }
  /* ---- hero ---- */
  .hero{position:relative;aspect-ratio:1600/1010;overflow:hidden;background:#16206a}
  .hero img{width:100%;height:100%;object-fit:cover;display:block}
  .hero::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(13,22,56,0) 38%,rgba(13,22,56,.55) 72%,#0d1638 100%);
  }
  .badge{
    position:absolute;top:14px;right:14px;z-index:2;
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(10,15,40,.62);backdrop-filter:blur(6px);
    border:1px solid rgba(150,170,255,.35);
    color:#dfe5ff;font-size:11.5px;font-weight:700;
    padding:6px 11px;border-radius:999px;letter-spacing:.2px;
  }
  .badge .dot{width:6px;height:6px;border-radius:50%;background:#7d8cff;box-shadow:0 0 8px #7d8cff}
  .brand{
    position:absolute;right:14px;bottom:12px;z-index:2;
    display:flex;align-items:center;gap:9px;
  }
  .brand .mark{width:34px;height:34px;border-radius:9px;overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,.4);flex:none}
  .brand .mark svg{display:block;width:100%;height:100%}
  .brand .name{line-height:1.15}
  .brand .name b{display:block;color:#fff;font-size:15px;font-weight:800;letter-spacing:.3px}
  .brand .name span{display:block;color:#aeb8ee;font-size:10.5px;font-weight:600;direction:ltr;text-align:right}
  /* ---- body ---- */
  .content{padding:18px 20px 22px}
  h1{
    color:#f4f6ff;font-size:18.5px;font-weight:800;line-height:1.55;
    margin-bottom:10px;
  }
  h1 .hl{color:#9fb0ff}
  p.lead{color:#aab3da;font-size:13.5px;line-height:1.85;margin-bottom:18px}
  /* ---- buttons ---- */
  .btn{
    display:flex;align-items:center;justify-content:center;gap:9px;
    width:100%;padding:15px 16px;border-radius:13px;
    font-size:15.5px;font-weight:800;text-decoration:none;
    transition:transform .12s ease,filter .12s ease,background .12s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn-primary{
    background:linear-gradient(180deg,#3b4fe0,#2638c4);
    color:#fff;
    box-shadow:0 10px 26px -8px rgba(56,76,220,.7);
  }
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-secondary{
    margin-top:11px;
    background:rgba(255,255,255,.05);
    color:#dde3ff;
    border:1px solid rgba(150,170,255,.28);
  }
  .btn-secondary:hover{background:rgba(255,255,255,.1)}
  .btn svg{flex:none}
  .foot{
    margin-top:16px;text-align:center;
    color:#7c86b8;font-size:11.5px;letter-spacing:.3px;direction:ltr;
  }
</style>
</head>

      <h1>معماری <span class="hl">«نظارت و تجسس»</span> شهروندان در جمهوری اسلامی ایران</h1>
