    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        body {
            background-color: #f3ebd7;
            color: #1a1a1a;
            direction: rtl;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .popup-container {
            background-color: #f3ebd7;
            border-radius: 18px;
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 380px;
            padding: 14px;
            text-align: center;
        }

        .poster {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            margin-top: 14px;
            border-radius: 10px;
            border: none;
            background-color: #d92b1f;
            color: #ffffff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.1s;
        }

        .button:hover {
            background-color: #b61f15;
        }

        .button:active {
            transform: scale(0.99);
        }
